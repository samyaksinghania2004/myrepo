{% extends "base.html" %}

{% block title %}Password reset sent · ClubsHub{% endblock %}

{% block content %}
<section class="section">
  <div class="container" style="max-width: 720px;">
    <h1 class="title">Check your email</h1>
    <div class="box">
      <p>
        If an eligible account exists for the email address you entered, we have sent a password reset link.
      </p>
    </div>
    <p><a href="{% url 'accounts:login' %}">Back to login</a></p>
  </div>
</section>
{% endblock %}
