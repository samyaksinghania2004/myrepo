<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0b1324">
    <title>Offline - ClubsHub</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #08111f;
            --panel: #101b2e;
            --text: #e7ecf7;
            --muted: #9fb0ce;
            --accent: #6ea8fe;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1.5rem;
            background:
                radial-gradient(circle at top, rgba(57, 94, 216, 0.2), transparent 36%),
                var(--bg);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .offline-card {
            width: min(420px, 100%);
            padding: 1.5rem;
            border-radius: 28px;
            background: linear-gradient(160deg, rgba(16, 27, 46, 0.98), rgba(11, 19, 36, 0.94));
            border: 1px solid rgba(110, 168, 254, 0.18);
            box-shadow: 0 24px 56px rgba(2, 6, 23, 0.4);
        }

        .badge {
            display: inline-flex;
            padding: 0.35rem 0.65rem;
            border-radius: 999px;
            background: rgba(110, 168, 254, 0.14);
            color: var(--accent);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0.85rem 0 0.35rem;
            font-size: clamp(1.9rem, 7vw, 2.4rem);
            line-height: 1.05;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
        }

        .actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-top: 1.25rem;
        }

        .button {
            appearance: none;
            border: 0;
            border-radius: 999px;
            padding: 0.8rem 1rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
        }

        .button-primary {
            background: linear-gradient(135deg, #2f74ff, #4f7cff);
            color: #fff;
        }

        .button-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            border: 1px solid rgba(148, 163, 184, 0.18);
        }
    </style>
</head>
<body>
    <section class="offline-card">
        <span class="badge">Offline</span>
        <h1>ClubsHub is temporarily unavailable</h1>
        <p>Your app is installed and ready, but this page needs an internet connection to load fresh campus data.</p>
        <div class="actions">
            <button class="button button-primary" type="button" onclick="window.location.reload()">Try again</button>
            <a class="button button-secondary" href="/">Go home</a>
        </div>
    </section>
</body>
</html>
