{% extends 'base.html' %}
{% block title %}Edit Message · ClubsHub{% endblock %}
{% block content %}
<div class="form-shell">
    <div class="surface-card form-card">
        <div class="surface-card__header">
            <div>
                <p class="eyebrow">Message editor</p>
                <h1>Edit message</h1>
            </div>
        </div>
        <form method="post" class="stack-gap">
            {% csrf_token %}
            {% for field in form %}
                <div>
                    {{ field }}
                    {% for error in field.errors %}<p class="help is-danger">{{ error }}</p>{% endfor %}
                </div>
            {% endfor %}
            <button class="button is-link" type="submit">Save changes</button>
        </form>
    </div>
</div>
{% endblock %}
